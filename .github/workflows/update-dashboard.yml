name: Update SKUSavvy Dashboard Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 11 * * *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate dashboard data
        env:
          SKUSAVVY_TOKEN: ${{ secrets.SKUSAVVY_TOKEN }}
          SHOPIFY_STORE_DOMAIN: ${{ secrets.SHOPIFY_STORE_DOMAIN }}
          SHOPIFY_ADMIN_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ADMIN_ACCESS_TOKEN }}
          SHOPIFY_API_VERSION: "2026-01"
          SHOPIFY_MONTHS_BACK: "18"
        run: |
          mkdir -p data
          python scripts/generate_data.py

      - name: Commit dashboard data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dashboard.json data/schema-debug.json
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Update dashboard data"
          git push
