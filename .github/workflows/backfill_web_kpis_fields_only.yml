name: Web KPIs Fields Backfill

on:
  workflow_dispatch:
    inputs:
      run_brands:
        description: "Brands to update"
        required: true
        default: "corro,cavali"
      start_date:
        description: "Start date YYYY-MM-DD"
        required: true
        default: "2024-01-01"
      end_date:
        description: "End date YYYY-MM-DD"
        required: true
        default: "2026-06-30"
      update_conversion_rate:
        description: "Also overwrite conversion_rate? true/false"
        required: true
        default: "false"

jobs:
  backfill-web-kpis:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests gspread google-auth

      - name: Run Web KPIs fields-only backfill
        env:
          SHOPIFY_TOKEN_CORRO: ${{ secrets.SHOPIFY_TOKEN_CORRO }}
          SHOPIFY_TOKEN_CAVALI: ${{ secrets.SHOPIFY_TOKEN_CAVALI }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          RUN_BRANDS: ${{ github.event.inputs.run_brands }}
          START_DATE: ${{ github.event.inputs.start_date }}
          END_DATE: ${{ github.event.inputs.end_date }}
          UPDATE_CONVERSION_RATE: ${{ github.event.inputs.update_conversion_rate }}
        run: |
          echo "RUN_BRANDS=$RUN_BRANDS"
          echo "START_DATE=$START_DATE"
          echo "END_DATE=$END_DATE"
          echo "UPDATE_CONVERSION_RATE=$UPDATE_CONVERSION_RATE"
          python -u backfill_web_kpis_fields_only.py
